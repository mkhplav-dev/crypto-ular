<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Вход в CryptoUlarbek" />
        <title>Вход — CryptoUlarbek</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="noise" aria-hidden="true"></div>
        <div class="app">
            <header class="header" id="header">
                <div class="header__container">
                    <a href="index.html" class="logo">
                        <span class="logo__mark" aria-hidden="true"></span>
                        <span class="logo__text">Crypto</span>
                        <span class="logo__badge">Инсайты</span>
                    </a>
                    <a href="index.html" class="btn btn--ghost">На главную</a>
                </div>
            </header>

            <main class="main">
                <section class="auth-section" aria-label="Страница входа">
                    <div class="auth-card">
                        <h1 class="auth-title">Вход</h1>

                        <div id="authError" class="auth-error" style="display: none;"></div>

                        <form id="loginForm" class="auth-form">
                            <label class="auth-label" for="emailInput">Email или имя пользователя</label>
                            <input
                                id="emailInput"
                                class="auth-input"
                                type="text"
                                autocomplete="email"
                                required
                                placeholder="you@example.com"
                            />

                            <label class="auth-label" for="passwordInput">Пароль</label>
                            <div class="auth-input-wrapper">
                                <input
                                    id="passwordInput"
                                    class="auth-input"
                                    type="password"
                                    autocomplete="current-password"
                                    required
                                    placeholder="Ваш пароль"
                                />
                                <button type="button" class="auth-input-toggle" id="togglePassword" aria-label="Показать пароль">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>

                            <div class="auth-form-options">
                                <label class="auth-remember-label">
                                    <input type="checkbox" id="rememberMe" checked />
                                    <span class="auth-checkbox"></span>
                                    <span>Запомнить меня</span>
                                </label>
                                <a href="#" class="auth-forgot-link">Забыли пароль?</a>
                            </div>

                            <button type="submit" class="btn btn--primary auth-submit">Войти</button>
                        </form>

                        <div class="auth-divider">или войдите через</div>

                        <div class="auth-oauth">
                            <button type="button" id="googleOAuthBtn" class="btn btn--ghost auth-oauth-btn auth-oauth-btn--google">
                                <svg class="auth-oauth-icon" viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                                Google
                            </button>
                            
                        </div>

                        <p class="auth-bottom">
                            Нет аккаунта?
                            <a href="register.html">Зарегистрироваться</a>
                        </p>
                        <p class="auth-bottom auth-bottom--muted">
                            <a href="index.html">← Вернуться на главную</a>
                        </p>
                    </div>
                </section>
            </main>
        </div>

        <script type="module" src="./auth-login.js"></script>
    </body>
</html>
